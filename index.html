<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a10">
<title>ArbHunter</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #060a10;
  --surface:   #0c1220;
  --surface2:  #111827;
  --border:    rgba(255,255,255,0.07);
  --green:     #00e676;
  --green-dim: rgba(0,230,118,0.1);
  --amber:     #ffab00;
  --amber-dim: rgba(255,171,0,0.1);
  --red:       #ff5252;
  --blue:      #448aff;
  --blue-dim:  rgba(68,138,255,0.1);
  --purple:    #d580ff;
  --text:      #e2e8f0;
  --muted:     #4a5568;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,230,118,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,230,118,0.025) 1px,transparent 1px);
  background-size:48px 48px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(0,80,40,0.18) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 90%,rgba(20,40,100,0.2) 0%,transparent 60%);
}

#app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:1rem 1rem 5rem}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 1.2rem;border-bottom:1px solid var(--border);margin-bottom:1.4rem}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:2.1rem;font-weight:900;letter-spacing:.06em;line-height:1}
.logo-arb{background:linear-gradient(135deg,var(--green),#00b0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-hunt{color:var(--amber);-webkit-text-fill-color:var(--amber)}
.hdr-right{display:flex;align-items:center;gap:.8rem}
.live-pill{display:flex;align-items:center;gap:.5rem;font-size:.75rem;padding:.3rem .7rem;border-radius:99px;border:1px solid var(--border);color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
.dot.on{background:var(--green);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.icon-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:.45rem .75rem;cursor:pointer;font-size:.82rem;color:var(--text);transition:all .2s}
.icon-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}

/* ── KEY MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:1rem}
.modal{background:var(--surface);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:2rem;width:100%;max-width:440px;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--amber);margin-bottom:.4rem}
.modal-sub{font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:1.2rem}
.modal-sub a{color:var(--blue);text-decoration:none}
.field-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem}
.text-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:'Barlow',sans-serif;font-size:.95rem;margin-bottom:1rem}
.text-input:focus{outline:none;border-color:var(--green)}
.btn-row{display:flex;gap:.7rem}
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.04em;border:none;border-radius:10px;padding:.7rem 1.4rem;cursor:pointer;transition:all .2s}
.btn-green{background:var(--green);color:#000}
.btn-green:hover{background:#1fffa0;transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,0.1)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.4rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.9rem;text-align:center}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900}
.stat-l{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:.15rem}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}
.chip{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.04em;padding:.32rem .85rem;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.chip.on{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.chip:hover:not(.on){border-color:rgba(255,255,255,.2);color:var(--text)}
.spacer{flex:1}
.min-wrap{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--muted)}
.mini-input{width:56px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.28rem .5rem;color:var(--text);font-size:.88rem;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700}

/* ── REFRESH ── */
.rbar{display:flex;align-items:center;gap:.7rem;margin-bottom:1.4rem;font-size:.78rem;color:var(--muted)}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:rot .7s linear infinite;display:none}
@keyframes rot{to{transform:rotate(360deg)}}
.cd{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;color:var(--green);min-width:20px}
.prog-track{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),#00b0ff);border-radius:99px;transition:width 1s linear}
.refresh-btn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;padding:.25rem .65rem;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);cursor:pointer}
.refresh-btn:hover{background:rgba(255,255,255,.1)}

/* ── CARDS ── */
.cards{display:flex;flex-direction:column;gap:.9rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card:hover{border-color:rgba(0,230,118,.25);box-shadow:0 0 30px rgba(0,230,118,.05)}
.card.hot{border-color:rgba(0,230,118,.45);box-shadow:0 0 24px rgba(0,230,118,.1)}
.card.warm{border-color:rgba(255,171,0,.35)}
.card.cool{border-color:rgba(68,138,255,.25)}

.card-head{display:flex;align-items:center;gap:.8rem;padding:1rem 1.1rem .85rem;border-bottom:1px solid var(--border)}
.sport-ico{font-size:1.35rem;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:9px;flex-shrink:0}
.ev-info{flex:1;min-width:0}
.ev-teams{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-time{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.profit-tag{font-family:'Barlow Condensed',sans-serif;font-size:1.45rem;font-weight:900;letter-spacing:.02em;padding:.28rem .75rem;border-radius:10px;flex-shrink:0}
.profit-tag.hot{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.profit-tag.warm{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,171,0,.3)}
.profit-tag.cool{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(68,138,255,.3)}

.stakes-area{padding:.85rem 1.1rem}
.stakes-hdr{font-size:.67rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.6rem}
.stake-row{display:grid;grid-template-columns:1fr auto auto auto;gap:.5rem;align-items:center;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stake-row:last-child{border-bottom:none}
.s-outcome{font-size:.88rem;font-weight:500}
.s-bm{font-size:.69rem;color:var(--muted);background:rgba(255,255,255,.05);padding:.18rem .45rem;border-radius:6px;white-space:nowrap}
.s-odds{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;color:var(--blue);text-align:right;min-width:38px}
.s-amt{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;color:var(--green);text-align:right;min-width:52px}

.calc-bar{display:flex;align-items:center;gap:.7rem;padding:.7rem 1.1rem;background:rgba(0,0,0,.25);border-top:1px solid var(--border)}
.calc-lbl{font-size:.73rem;color:var(--muted);white-space:nowrap}
.calc-inp{width:74px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;padding:.28rem .5rem;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;text-align:center}
.calc-inp:focus{outline:none;border-color:var(--green)}
.calc-res{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;color:var(--green);text-align:right}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-ico{font-size:2.8rem;margin-bottom:.8rem}
.empty-ttl{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:.4rem}
.big-spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 1rem}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--green);border-radius:12px;padding:.7rem 1.4rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;color:var(--green);z-index:200;pointer-events:none;animation:toastIn .3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  .stats{gap:.5rem}
  .stat-n{font-size:1.5rem}
  .s-bm{display:none}
  .ev-teams{font-size:1rem}
  .logo{font-size:1.7rem}
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">
      <span class="logo-arb">ARB</span><span class="logo-hunt">HUNTER</span>
    </div>
    <div class="hdr-right">
      <div class="live-pill">
        <div class="dot" id="dot"></div>
        <span id="status-txt">–</span>
      </div>
      <button class="icon-btn" onclick="openModal()">⚙️ API Kľúč</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-n" style="color:var(--green)" id="s-arb">–</div>
      <div class="stat-l">Arbitráží</div>
    </div>
    <div class="stat">
      <div class="stat-n" style="color:var(--blue)" id="s-ev">–</div>
      <div class="stat-l">Podujatí</div>
    </div>
    <div class="stat">
      <div class="stat-n" style="color:var(--amber)" id="s-best">–</div>
      <div class="stat-l">Max profit</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="chip on" onclick="setFilter(this,'all')">Všetky</button>
    <button class="chip" onclick="setFilter(this,'tennis')">🎾 Tenis</button>
    <button class="chip" onclick="setFilter(this,'basketball')">🏀 Basketbal</button>
    <button class="chip" onclick="setFilter(this,'americanfootball')">🏈 Am. futbal</button>
    <button class="chip" onclick="setFilter(this,'baseball')">⚾ Baseball</button>
    <div class="spacer"></div>
    <div class="min-wrap">
      Min %:
      <input class="mini-input" id="min-p" type="number" value="0.1" step="0.1" min="0" oninput="render()">
    </div>
  </div>

  <!-- REFRESH BAR -->
  <div class="rbar">
    <div class="spin" id="spin"></div>
    <span id="cd-lbl">Ďalší refresh o</span>
    <span class="cd" id="cd">30</span>s
    <div class="prog-track"><div class="prog-fill" id="prog" style="width:100%"></div></div>
    <button class="refresh-btn" onclick="fetchNow()">🔄 Teraz</button>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards">
    <div class="empty">
      <div class="big-spin"></div>
      <div style="color:var(--muted)">Načítavam kurzy...</div>
    </div>
  </div>

</div>

<!-- KEY MODAL -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">🔑 API Kľúč – The Odds API</div>
    <div class="modal-sub">
      Zaregistruj sa zadarmo na <a href="https://the-odds-api.com" target="_blank">the-odds-api.com</a>
      → skopíruj API kľúč → vlož sem. Kľúč sa uloží len do tvojho tabletu.
    </div>
    <div class="field-label">Tvoj API kľúč</div>
    <input class="text-input" id="key-inp" type="text" placeholder="napr. abc123def456...">
    <div class="btn-row">
      <button class="btn btn-green" onclick="saveKey()">✅ Uložiť a spustiť</button>
      <button class="btn btn-ghost" onclick="closeModal()">Zrušiť</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const REFRESH = 30;
const SPORTS = [
  'tennis_atp','tennis_wta',
  'tennis_atp_french_open','tennis_wta_french_open',
  'tennis_atp_wimbledon','tennis_atp_us_open',
  'basketball_nba','basketball_euroleague',
  'americanfootball_nfl',
  'baseball_mlb',
];
const SPORT_EMOJI = {tennis:'🎾',basketball:'🏀',americanfootball:'🏈',baseball:'⚾'};

// ── STATE ─────────────────────────────────────────────────────────
let opps = [];
let filter = 'all';
let cd = REFRESH;
let timer = null;

// ── INIT ─────────────────────────────────────────────────────────
function init() {
  const key = localStorage.getItem('odds_api_key');
  if (!key) { openModal(); setStatus(false,'Chýba API kľúč'); }
  else { fetchNow(); startTimer(); }
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchNow() {
  const key = localStorage.getItem('odds_api_key');
  if (!key) { openModal(); return; }

  showSpin(true);
  setStatus(false,'Načítavam...');
  resetCd();

  const results = [];
  const total_ev = {n:0};

  for (const sport of SPORTS) {
    const url = `https://api.the-odds-api.com/v4/sports/${sport}/odds?apiKey=${key}&regions=eu&markets=h2h&oddsFormat=decimal&dateFormat=iso`;
    try {
      const r = await fetch(url);
      if (r.status === 401) { showError('Neplatný API kľúč'); openModal(); showSpin(false); return; }
      if (!r.ok) continue;
      const events = await r.json();
      if (!Array.isArray(events)) continue;
      total_ev.n += events.length;
      for (const ev of events) {
        const arb = calcArb(ev, sport);
        if (arb) results.push(arb);
      }
    } catch(e) { /* sport not available */ }
  }

  results.sort((a,b) => b.profit_pct - a.profit_pct);
  opps = results;

  document.getElementById('s-arb').textContent = results.length;
  document.getElementById('s-ev').textContent = total_ev.n;
  document.getElementById('s-best').textContent = results[0] ? `+${results[0].profit_pct.toFixed(2)}%` : '–';

  const now = new Date().toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'});
  setStatus(true, `Živé · ${now}`);
  showSpin(false);
  render();
}

// ── CALC ARB ─────────────────────────────────────────────────────
function calcArb(event, sport) {
  const bms = event.bookmakers || [];
  if (bms.length < 2) return null;

  const best = {}; // name -> {odds, bm}
  for (const bm of bms) {
    for (const mkt of (bm.markets||[])) {
      if (mkt.key !== 'h2h') continue;
      for (const oc of (mkt.outcomes||[])) {
        if (!best[oc.name] || oc.price > best[oc.name].odds)
          best[oc.name] = {odds: oc.price, bm: bm.title};
      }
    }
  }

  const entries = Object.entries(best);
  if (entries.length < 2) return null;

  const impl = entries.reduce((s,[,v]) => s + 1/v.odds, 0);
  if (impl >= 1.0) return null;

  const profit_pct = Math.round((1/impl - 1)*10000)/100;
  if (profit_pct < 0.05) return null;

  const stakes = entries.map(([name,{odds,bm}]) => {
    const stake = Math.round((100/impl)/odds*100)/100;
    return {outcome:name, odds, bm, stake, ret: Math.round(stake*odds*100)/100};
  });

  const sportKey = Object.keys(SPORT_EMOJI).find(k => sport.includes(k)) || 'other';

  const time = event.commence_time
    ? new Date(event.commence_time).toLocaleString('sk-SK',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
    : '';

  return {
    id: event.id,
    home: event.home_team || '',
    away: event.away_team || '',
    time,
    sport: sport,
    sportKey,
    emoji: SPORT_EMOJI[sportKey] || '🏆',
    profit_pct,
    impl_pct: Math.round(impl*10000)/100,
    stakes,
  };
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  const minP = parseFloat(document.getElementById('min-p').value) || 0;
  let list = opps.filter(o => {
    if (filter !== 'all' && !o.sport.includes(filter)) return false;
    if (o.profit_pct < minP) return false;
    return true;
  });

  const el = document.getElementById('cards');

  if (!list.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-ico">🔍</div>
      <div class="empty-ttl">Žiadne arbitráže momentálne</div>
      <div style="font-size:.84rem;margin-top:.4rem">Aktualizujem každých ${REFRESH}s · skús znížiť min. profit</div>
    </div>`;
    return;
  }

  el.innerHTML = list.map((o,i) => {
    const tier = o.profit_pct >= 2 ? 'hot' : o.profit_pct >= 0.8 ? 'warm' : 'cool';
    const rowsHtml = o.stakes.map(s => `
      <div class="stake-row">
        <div class="s-outcome">${s.outcome}</div>
        <div class="s-bm">${s.bm}</div>
        <div class="s-odds">${s.odds.toFixed(2)}</div>
        <div class="s-amt" id="a${i}_${s.outcome.replace(/\W/g,'_')}">€${s.stake.toFixed(2)}</div>
      </div>`).join('');

    const ret100 = (100/o.impl_pct*100).toFixed(2);
    const prof100 = (100/o.impl_pct*100 - 100).toFixed(2);

    return `<div class="card ${tier}" style="animation-delay:${i*0.04}s">
      <div class="card-head">
        <div class="sport-ico">${o.emoji}</div>
        <div class="ev-info">
          <div class="ev-teams">${o.home} vs ${o.away}</div>
          <div class="ev-time">${o.time}</div>
        </div>
        <div class="profit-tag ${tier}">+${o.profit_pct.toFixed(2)}%</div>
      </div>
      <div class="stakes-area">
        <div class="stakes-hdr">Stávky pre €<span id="tot${i}">100</span></div>
        ${rowsHtml}
      </div>
      <div class="calc-bar">
        <span class="calc-lbl">Investícia €:</span>
        <input class="calc-inp" type="number" value="100" min="1"
          oninput="recalc(this,${i},${JSON.stringify(o.stakes)},${o.impl_pct})">
        <div class="calc-res" id="res${i}">Výnos €${ret100} · Profit €${prof100}</div>
      </div>
    </div>`;
  }).join('');
}

function recalc(inp, i, stakes, impl_pct) {
  const tot = parseFloat(inp.value)||100;
  document.getElementById(`tot${i}`).textContent = tot.toFixed(0);
  stakes.forEach(s => {
    const ns = (tot/(impl_pct/100))/s.odds;
    const el = document.getElementById(`a${i}_${s.outcome.replace(/\W/g,'_')}`);
    if(el) el.textContent = `€${ns.toFixed(2)}`;
  });
  const ret = tot/(impl_pct/100);
  document.getElementById(`res${i}`).textContent =
    `Výnos €${ret.toFixed(2)} · Profit €${(ret-tot).toFixed(2)}`;
}

// ── FILTER ───────────────────────────────────────────────────────
function setFilter(btn, f) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on'); filter=f; render();
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timer);
  timer = setInterval(()=>{
    cd--;
    document.getElementById('cd').textContent = cd;
    document.getElementById('prog').style.width = (cd/REFRESH*100)+'%';
    if(cd<=0) fetchNow();
  },1000);
}
function resetCd() { cd=REFRESH; document.getElementById('cd').textContent=cd; document.getElementById('prog').style.width='100%'; startTimer(); }

// ── STATUS ───────────────────────────────────────────────────────
function setStatus(live, txt) {
  document.getElementById('dot').className = 'dot'+(live?' on':'');
  document.getElementById('status-txt').textContent = txt;
}
function showSpin(v) { document.getElementById('spin').style.display = v?'inline-block':'none'; }
function showError(msg) { setStatus(false,msg); document.getElementById('cards').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">${msg}</div></div>`; }

// ── MODAL ────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').style.display='flex';
  const k=localStorage.getItem('odds_api_key');
  if(k) document.getElementById('key-inp').value=k;
}
function closeModal() { document.getElementById('modal').style.display='none'; }
function saveKey() {
  const k=document.getElementById('key-inp').value.trim();
  if(!k){toast('⚠️ Vlož API kľúč!');return;}
  localStorage.setItem('odds_api_key',k);
  closeModal(); toast('✅ Kľúč uložený!');
  fetchNow(); startTimer();
}

// ── TOAST ────────────────────────────────────────────────────────
function toast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

init();
</script>
